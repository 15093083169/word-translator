<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Click Translate 设置</title>
    <style>
      body {
        margin: 0;
        padding: 12px 14px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        width: 320px;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 6px;
      }
      p {
        font-size: 12px;
        color: #9ca3af;
        margin: 0 0 8px;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        margin-bottom: 4px;
      }
      input[type="password"] {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #374151;
        background: #020617;
        color: #e5e7eb;
        font-size: 12px;
      }
      input[type="password"]:focus {
        outline: none;
        border-color: #38bdf8;
      }
      button {
        margin-top: 10px;
        padding: 6px 14px;
        border-radius: 6px;
        border: none;
        background: #0ea5e9;
        color: #020617;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #38bdf8;
      }
      button:active {
        background: #0891b2;
      }
      a {
        color: #38bdf8;
        text-decoration: none;
        font-size: 12px;
      }
      a:hover {
        text-decoration: underline;
      }
      .status {
        margin-top: 6px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>🌐 Click Translate</h1>
    <p>
      当前使用模型：<strong>glm-4-flash</strong>（bigmodel 提供免费额度，可直接使用）。
    </p>

    <label for="apiKey">GLM API Key</label>
    <input
      type="password"
      id="apiKey"
      placeholder="请输入在 bigmodel 控制台创建的 GLM API Key"
    />

    <p>
      获取 Key：
      <a href="https://open.bigmodel.cn" target="_blank"
        >在浏览器中打开 bigmodel 控制台</a
      >
    </p>

    <button id="saveBtn">保存</button>
    <span class="status" id="status"></span>

    <script src="popup.js"></script>
  </body>
</html>
